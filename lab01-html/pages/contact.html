<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <title>Контакти</title>
</head>
<body>

<header>
  <nav>
    <a href="../index.html">Головна</a>
    <a href="about.html">Про мене</a>
    <a href="contact.html">Контакти</a>
  </nav>
</header>

<main>
  <h1>Контакти</h1>

  <form action="#" method="get">

    <p>
      <label for="name">Ім’я:</label>
      <input id="name" name="name" type="text" required minlength="2">
    </p>

    <p>
      <label for="email">Email:</label>
      <input id="email" name="email" type="email" required>
    </p>

    <p>
      <label for="phone">Телефон:</label>
      <input id="phone" name="phone" type="tel">
    </p>

    <p>
      <label for="topic">Тема:</label>
      <select id="topic" name="topic">
        <option>Навчання</option>
        <option>Робота</option>
        <option>Інше</option>
      </select>
    </p>

    <fieldset>
      <legend>Спосіб зв’язку</legend>
      <label><input type="radio" name="contactWay" value="email" checked> Email</label>
      <label><input type="radio" name="contactWay" value="phone"> Телефон</label>
    </fieldset>

    <p>
      <label for="message">Повідомлення:</label><br>
      <textarea id="message" name="message"></textarea>
    </p>

    <p>
      <label>
        <input type="checkbox" required>
        Погоджуюсь з правилами
      </label>
    </p>

    <button type="submit">Надіслати</button>

  </form>
</main>

</body>
</html>
